<!DOCTYPE html>
<html>
    
    <head> <! the head is the setup of the code, it tells the browser what ingredients we will use like title, style. head =setup , body = step by step instructions >
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
        <title> pomodoro timer!</title> <!title of website (what shows in browser)>

    </head>


    <body> <! body of the code what the user will see, basically instructions of the code>
       <div class="background-image"></div> <!we treat it as a class or an object>
       <button id="mybtn">CHANGE BACKGROUND</button>
       
       <div class="button-container">
                <div class="start-button">
                    <img src= "start.png" alt="start button" width="180">
            </div>

            <div class="stop-button">
                    <img src="stop.png" alt="stop button" width="180">
            </div>

            <div class="pause-button">
                    <img src="pause.png" alt="pause button" width="180">
            </div>
    </div>
    <script src="script.js"></script>
    </body>
    
        
</html>
